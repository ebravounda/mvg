# SPA fallback for the Expo PWA static export
server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 50M;

  # MIME types adicionales para PWA
  types {
    application/manifest+json  webmanifest;
  }

  # Long cache for hashed assets
  location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|webp|ico)$ {
    expires 30d;
    access_log off;
    try_files $uri =404;
  }

  # Service Worker — NUNCA cachear (sino los usuarios quedan con SW viejo)
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Service-Worker-Allowed "/";
    try_files $uri =404;
  }

  # Manifest — corto cache (1h) + Content-Type correcto
  location = /manifest.webmanifest {
    add_header Cache-Control "public, max-age=3600";
    default_type application/manifest+json;
    try_files $uri =404;
  }

  # Never cache index.html
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA history routing
  location / {
    try_files $uri $uri/ /index.html;
  }
}
