# MVG Computación — Plesk production stack (100% Docker, totalmente aislado)
# Cada servicio en su propio container, no comparte nada con tramilex/gym24/ingresoqr
services:
  mongo:
    image: mongo:7
    container_name: mvg_mongo
    restart: unless-stopped
    volumes:
      - mvg_mongo_data:/data/db
    ports:
      - "127.0.0.1:${MONGO_PORT:-27020}:27017"
    networks:
      - mvg_net
    command: ["--bind_ip", "0.0.0.0"]

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: mvg-backend:latest
    container_name: mvg_backend
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      DB_NAME: "mvg_db"
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8101}:8001"
    depends_on:
      - mongo
    networks:
      - mvg_net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: mvg-frontend:latest
    container_name: mvg_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3101}:80"
    depends_on:
      - backend
    networks:
      - mvg_net

volumes:
  mvg_mongo_data:
    name: mvg_mongo_data

networks:
  mvg_net:
    driver: bridge
    name: mvg_net
